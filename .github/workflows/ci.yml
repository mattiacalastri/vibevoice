name: CI

# VibeVoice is a macOS app (AppKit, CoreAudio, mlx_whisper on Apple Silicon),
# so CI runs on macOS. The contract tests are headless: no microphone, no GUI,
# no model download (mlx_whisper is lazily imported and stubbed in tests).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pynput pytest ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Contract tests
        run: pytest
