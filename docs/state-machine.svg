<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 300" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
  <defs>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1fff52"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="780" height="300" rx="16" fill="#0a0e0a"/>
  <text x="32" y="42" fill="#1fff52" font-size="20" font-weight="bold">VibeVoice — engine state machine</text>
  <text x="32" y="66" fill="#5a7a5f" font-size="13">The value in ~/.vibevoice/state on each transition. Energy-VAD drives it.</text>

  <!-- idle -->
  <rect x="50" y="150" width="170" height="70" rx="35" fill="#0d130d" stroke="#5a7a5f" stroke-width="2"/>
  <text x="135" y="186" fill="#cfeccf" font-size="18" font-weight="bold" text-anchor="middle">idle</text>
  <text x="135" y="206" fill="#5a7a5f" font-size="10" text-anchor="middle">pill hidden (alpha 0)</text>

  <!-- recording -->
  <rect x="305" y="150" width="170" height="70" rx="35" fill="#0f1a10" stroke="#1fff52" stroke-width="2"/>
  <text x="390" y="186" fill="#1fff52" font-size="18" font-weight="bold" text-anchor="middle">recording</text>
  <text x="390" y="206" fill="#9fd3a4" font-size="10" text-anchor="middle">live waveform streams</text>

  <!-- transcribing -->
  <rect x="560" y="150" width="170" height="70" rx="35" fill="#0f1a10" stroke="#1fff52" stroke-width="2"/>
  <text x="645" y="186" fill="#1fff52" font-size="17" font-weight="bold" text-anchor="middle">transcribing</text>
  <text x="645" y="206" fill="#9fd3a4" font-size="10" text-anchor="middle">whisper → raw.txt</text>

  <!-- idle -> recording -->
  <line x1="220" y1="185" x2="303" y2="185" stroke="#1fff52" stroke-width="2" marker-end="url(#a2)"/>
  <text x="261" y="140" fill="#1fff52" font-size="11" text-anchor="middle">voice onset</text>
  <text x="261" y="155" fill="#5a7a5f" font-size="10" text-anchor="middle">RMS ≥ 0.015</text>

  <!-- recording -> transcribing -->
  <line x1="475" y1="185" x2="558" y2="185" stroke="#1fff52" stroke-width="2" marker-end="url(#a2)"/>
  <text x="516" y="140" fill="#1fff52" font-size="11" text-anchor="middle">end of speech</text>
  <text x="516" y="155" fill="#5a7a5f" font-size="10" text-anchor="middle">1.5s silence / 15s max</text>

  <!-- transcribing -> idle (curved back) -->
  <path d="M 645 220 L 645 262 L 135 262 L 135 222" fill="none" stroke="#1fff52" stroke-width="2" marker-end="url(#a2)"/>
  <text x="390" y="282" fill="#1fff52" font-size="11" text-anchor="middle">text pasted → back to idle  ·  (utterances &lt; 0.4s are dropped)</text>
</svg>
